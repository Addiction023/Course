<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="action">
      <label for="name">Name:</label>
      <input type="text" name="name" placeholder="FullName" /><br /><br />

      <label for="sex">Sex:</label>
      <input type="radio" id="male" name="sex" value="male" unchecked />
      <label for="male">male</label>
      <input type="radio" id="female" name="sex" value="female" unchecked />
      <label for="female">female</label>
      <br /><br />

      <label for="country">Country:</label>
      <select id="country" name="country">
        <option value="india">India</option>
        <option value="Nepal">Nepal</option>
        <option value="USA">USA</option>
        <option value="Canada">Canada</option></select
      ><br /><br />

      <label for="message">Message:</label><br />
      <textarea id="message" name="message" rows="4" cols="30"></textarea
      ><br /><br />

      <input type="checkbox" id="news" name="newsletter" />
      <label for="news">Subscribe?</label><br /><br />

      <button>Submit</button>
    </form>
  </body>
</html>
