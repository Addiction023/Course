<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback Form</title>
  </head>
  <body>
    <h1>Feedback Form</h1>

    <form action="/contact">
      <label for="name">Name:</label>
      <input type="text" id="name" placeholder="Write your name" />
      <br /><br />

      <label for="email">Email:</label>
      <input type="email" id="email" placeholder="Write your email" />
      <br /><br />

      <label for="message">Message:</label>
      <br />
      <textarea id="message" rows="4" cols="30"></textarea>
      <br /><br />

      <label for="rating">Rate us our of 5:</label><br />

      <input type="radio" id="rate1" name="rating" value="1" />
      <label for="rate1">1</label><br />

      <input type="radio" id="rate2" name="rating" value="2" />
      <label for="rate2">2</label><br />

      <input type="radio" id="rate3" name="rating" value="3" />
      <label for="rate3">3</label><br />

      <input type="radio" id="rate4" name="rating" value="4" />
      <label for="rate4">4</label><br />

      <input type="radio" id="rate5" name="rating" value="5" />
      <label for="rate5">5</label><br />
      <br /><br />

      <button>Send your message!</button>
    </form>
  </body>
</html>
